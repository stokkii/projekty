<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sineko Tattoo • Запис</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0a0a0a;
            color: #f1f1f1;
        }
        .title { font-family: 'Playfair Display', sans-serif; letter-spacing: -0.04em; }
        .neon { text-shadow: 0 0 25px #10b981, 0 0 50px #10b981; }

        .card {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: translateY(-10px); }
        .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }

        .slot {
            transition: all 0.3s ease;
        }
        .slot.selected {
            background-color: #10b981;
            color: black;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div class="max-w-md mx-auto bg-black min-h-screen">
        <!-- HEADER -->
        <div class="fixed top-0 w-full max-w-md bg-zinc-950 border-b border-zinc-800 z-50 px-5 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-emerald-500 to-teal-600 rounded-2xl flex items-center justify-center text-3xl shadow-lg">🖤</div>
                <div>
                    <div class="title text-3xl font-bold neon">SINEKO</div>
                    <div class="text-xs text-emerald-400 -mt-1">TATTOO</div>
                </div>
            </div>
            <button onclick="showMainMenu()" class="text-3xl text-zinc-400 hover:text-white">⌂</button>
        </div>

        <div class="pt-20 px-5">
            <!-- GREETING -->
            <div id="greeting">
                <div class="relative h-[420px] rounded-3xl overflow-hidden shadow-2xl mb-10">
                    <img src="https://picsum.photos/id/1015/800/1200" class="w-full h-full object-cover" alt="Софія">
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/70 to-black"></div>
                    <div class="absolute bottom-10 left-8">
                        <h1 class="title text-6xl font-black neon">Софія</h1>
                        <p class="text-emerald-300 text-2xl">Тату-майстер</p>
                    </div>
                </div>
                <button onclick="showMainMenu()" class="w-full py-7 bg-white text-black rounded-3xl text-2xl font-semibold">Почати запис</button>
            </div>

            <!-- MAIN MENU -->
            <div id="main-menu" class="hidden grid grid-cols-2 gap-4">
                <button onclick="showPortfolio()" class="card glass rounded-3xl p-8 text-left">
                    <div class="text-6xl mb-6">📸</div>
                    <div class="title text-3xl font-bold">Портфоліо</div>
                </button>
                <button onclick="showBooking()" class="card bg-gradient-to-br from-emerald-600 to-teal-600 rounded-3xl p-8 text-left text-white">
                    <div class="text-6xl mb-6">📅</div>
                    <div class="title text-3xl font-bold">Записатися</div>
                </button>
                <button onclick="showPrice()" class="card glass rounded-3xl p-8 text-left">
                    <div class="text-6xl mb-6">💎</div>
                    <div class="title text-3xl font-bold">Прайс</div>
                </button>
                <a href="https://www.instagram.com/sineko_tattoo/" target="_blank" class="card bg-gradient-to-br from-pink-500 to-purple-600 rounded-3xl p-8 text-left text-white">
                    <div class="text-6xl mb-6">📷</div>
                    <div class="title text-3xl font-bold">Instagram</div>
                </a>
            </div>

            <!-- PORTFOLIO -->
            <div id="portfolio-screen" class="hidden">
                <h2 class="title text-4xl font-bold mb-6">Портфоліо</h2>
                <div class="grid grid-cols-3 gap-4">
                    <div onclick="showCategory('5см')" class="card glass rounded-3xl overflow-hidden cursor-pointer">
                        <div class="h-32 bg-[url('https://picsum.photos/id/1015/300/300')] bg-cover"></div>
                        <div class="p-4 text-center">5 см</div>
                    </div>
                    <div onclick="showCategory('10см')" class="card glass rounded-3xl overflow-hidden cursor-pointer">
                        <div class="h-32 bg-[url('https://picsum.photos/id/201/300/300')] bg-cover"></div>
                        <div class="p-4 text-center">10 см</div>
                    </div>
                    <div onclick="showCategory('15см')" class="card glass rounded-3xl overflow-hidden cursor-pointer">
                        <div class="h-32 bg-[url('https://picsum.photos/id/301/300/300')] bg-cover"></div>
                        <div class="p-4 text-center">15 см</div>
                    </div>
                </div>
            </div>

            <!-- BOOKING -->
            <div id="booking-screen" class="hidden">
                <h2 class="title text-4xl font-bold mb-6">Запис на сеанс</h2>
                
                <div id="step-service">
                    <h3 class="mb-4 text-lg">Оберіть розмір тату</h3>
                    <div class="space-y-3">
                        <button onclick="selectService('5см')" class="w-full py-5 glass rounded-3xl text-left px-6">5 см — 1500 грн</button>
                        <button onclick="selectService('10см')" class="w-full py-5 glass rounded-3xl text-left px-6">10 см — 2500 грн</button>
                        <button onclick="selectService('15см')" class="w-full py-5 glass rounded-3xl text-left px-6">15 см — 3500 грн</button>
                    </div>
                </div>

                <div id="step-date" class="hidden">
                    <h3 class="mb-4">Оберіть дату</h3>
                    <div id="dates" class="grid grid-cols-2 gap-3"></div>
                </div>

                <div id="step-time" class="hidden">
                    <h3 class="mb-4">Оберіть час</h3>
                    <div id="times" class="grid grid-cols-3 gap-3"></div>
                </div>

                <div id="step-contacts" class="hidden">
                    <input id="name" placeholder="Ім'я та прізвище" class="w-full py-5 px-6 glass rounded-3xl mb-4">
                    <input id="phone" placeholder="+380 XX XXX XX XX" class="w-full py-5 px-6 glass rounded-3xl mb-6">
                    <button onclick="submitBooking()" class="w-full py-6 bg-emerald-600 rounded-3xl text-xl font-semibold">Підтвердити запис</button>
                </div>
            </div>

            <!-- PRICE -->
            <div id="price-screen" class="hidden">
                <h2 class="title text-4xl font-bold mb-6">Прайс</h2>
                <img src="https://picsum.photos/id/870/600/900" class="rounded-3xl w-full shadow-2xl" alt="Прайс">
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#0a0a0a");

        let bookingData = {};
        let lastBooking = localStorage.getItem('lastBooking');

        function showScreen(id) {
            document.querySelectorAll('div[id$="-screen"], #greeting, #main-menu').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function showMainMenu() {
            showScreen('main-menu');
        }

        function showPortfolio() { showScreen('portfolio-screen'); }
        function showPrice() { showScreen('price-screen'); }

        function showBooking() {
            if (lastBooking && (Date.now() - new Date(lastBooking) < 86400000)) {
                alert("Ви вже записувалися сьогодні. Спробуйте завтра.");
                return;
            }
            bookingData = {};
            resetSteps();
            showScreen('booking-screen');
            document.getElementById('step-service').classList.remove('hidden');
        }

        function resetSteps() {
            document.getElementById('step-date').classList.add('hidden');
            document.getElementById('step-time').classList.add('hidden');
            document.getElementById('step-contacts').classList.add('hidden');
        }

        function selectService(size) {
            bookingData.service = size;
            document.getElementById('step-service').classList.add('hidden');
            document.getElementById('step-date').classList.remove('hidden');
            renderDates();
        }

        function renderDates() {
            const container = document.getElementById('dates');
            container.innerHTML = '';
            const today = new Date();
            for (let i = 0; i < 10; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + i);
                const btn = document.createElement('button');
                btn.className = 'slot glass rounded-3xl p-4 text-center';
                btn.innerHTML = `<div class="text-sm">${d.toLocaleDateString('uk-UA', {weekday:'short'})}</div><div class="text-2xl font-bold">${d.getDate()}</div>`;
                btn.onclick = () => selectDate(d);
                container.appendChild(btn);
            }
        }

        function selectDate(date) {
            bookingData.date = date.toISOString().split('T')[0];
            document.getElementById('step-date').classList.add('hidden');
            document.getElementById('step-time').classList.remove('hidden');
            renderTimes();
        }

        function renderTimes() {
            const times = ["10:00","11:00","12:00","13:00","14:00","15:00","16:00","17:00","18:00"];
            const container = document.getElementById('times');
            container.innerHTML = '';
            times.forEach(t => {
                const btn = document.createElement('button');
                btn.className = 'slot glass rounded-3xl py-4 text-center font-medium';
                btn.textContent = t;
                btn.onclick = () => {
                    bookingData.time = t;
                    document.getElementById('step-time').classList.add('hidden');
                    document.getElementById('step-contacts').classList.remove('hidden');
                };
                container.appendChild(btn);
            });
        }

        function submitBooking() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            if (!name || !phone) return alert("Заповніть дані");

            bookingData.name = name;
            bookingData.phone = phone;

            localStorage.setItem('lastBooking', new Date().toISOString());
            
            alert(`✅ Запис підтверджено!\n\nПослуга: ${bookingData.service}\nДата: ${bookingData.date}\nЧас: ${bookingData.time}\n\nСофія зв'яжеться з вами.`);
            showMainMenu();
        }

        function showCategory(cat) {
            alert(`Альбом робіт ${cat} см (відправлено як медіагрупа)`);
        }

        window.onload = () => {
            tg.ready();
            setTimeout(() => showMainMenu(), 1500);
        };
    </script>
</body>
</html>
