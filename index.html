<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sineko Tattoo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #050505;
            color: #f8f8f8;
        }
        .title {
            font-family: 'Playfair Display', sans-serif;
            letter-spacing: -0.04em;
        }
        .neon {
            text-shadow: 0 0 30px #10b981, 0 0 60px #10b981;
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .card {
            transition: all 0.5s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 40px -15px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div class="max-w-md mx-auto bg-[#050505] min-h-screen">
        <!-- HEADER -->
        <div class="fixed top-0 w-full max-w-md bg-black/90 backdrop-blur-lg border-b border-zinc-800 z-50 px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-cyan-500 rounded-2xl flex items-center justify-center text-4xl shadow-lg">🖤</div>
                <div>
                    <div class="title text-4xl font-bold neon">SINEKO</div>
                    <div class="text-xs text-emerald-400 tracking-widest">TATTOO STUDIO</div>
                </div>
            </div>
            <button onclick="showMainMenu()" class="text-4xl text-zinc-400 hover:text-emerald-400">⌂</button>
        </div>

        <div class="pt-24 px-6">
            <!-- GREETING -->
            <div id="greeting" class="text-center slide-in">
                <div class="h-[460px] rounded-3xl overflow-hidden relative mb-12 shadow-2xl">
                    <img src="https://picsum.photos/id/1015/800/1400" class="w-full h-full object-cover" alt="Софія">
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-black/70 to-black"></div>
                    <div class="absolute bottom-12 left-8 text-left">
                        <h1 class="title text-7xl font-black neon">Софія</h1>
                        <p class="text-emerald-300 text-2xl mt-1">Тату-майстер</p>
                    </div>
                </div>
                <button onclick="showMainMenu()" class="w-full py-8 bg-white text-black rounded-3xl text-2xl font-semibold shadow-2xl hover:bg-zinc-100">Почати запис</button>
            </div>

            <!-- MAIN MENU -->
            <div id="main-menu" class="hidden space-y-5">
                <button onclick="showPortfolio()" class="card glass w-full p-8 rounded-3xl text-left">
                    <div class="text-6xl mb-6">📸</div>
                    <div class="title text-3xl font-bold">Портфоліо</div>
                    <div class="text-zinc-400">Роботи майстра</div>
                </button>

                <button onclick="showBooking()" class="card bg-gradient-to-br from-emerald-600 via-teal-600 to-cyan-600 w-full p-8 rounded-3xl text-left text-white">
                    <div class="text-6xl mb-6">📅</div>
                    <div class="title text-3xl font-bold">Записатися</div>
                    <div class="opacity-90">На сеанс</div>
                </button>

                <button onclick="showPrice()" class="card glass w-full p-8 rounded-3xl text-left">
                    <div class="text-6xl mb-6">💎</div>
                    <div class="title text-3xl font-bold">Прайс</div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor("#050505");

        function showMainMenu() {
            document.getElementById('greeting').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function showPortfolio() {
            alert("Портфоліо — преміум галерея (буде додано повноцінно)");
        }

        function showBooking() {
            alert("Форма запису на сеанс (повний flow буде додано)");
        }

        function showPrice() {
            alert("Прайс (зображення або таблиця)");
        }

        window.onload = () => {
            tg.ready();
            setTimeout(() => showMainMenu(), 1600);
        };
    </script>
</body>
</html>
